<!DOCTYPE html>
<html lang="zh-TW">
<head><style>.fa-heart { color: white !important; }</style>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>後台 - 著作成果管理</title>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <link href="css/admin-custom.css" rel="stylesheet">
</head>
<body>
    <div class="templatemo-flex-row">
        <div class="templatemo-sidebar">
            <header class="templatemo-site-header"><div class="square"></div><h1>中央大學孫立憲</h1></header>
            <div class="profile-photo-container">
                <img src="images/LSBOY.png" alt="Profile Photo" class="img-responsive">
                <div class="profile-photo-overlay"></div>
            </div>
            <div class="sidebar-profile">
                <div class="sidebar-note">用來維護前台 Publications 與 Preprints。之後可直接對接 `Publication` API。</div>
            </div>
        <div id="nav-placeholder"></div>

        </div>
        <div class="templatemo-content col-1 light-gray-bg">
            <div class="page-shell">
            <div class="page-header-card">
                <h2>著作成果管理</h2>
                <p>集中維護正式發表與預印本，後續會加上排序、附件連結與顯示狀態。</p>
            </div>
            <div class="templatemo-content-container content-card">
                <div class="templatemo-content-widget no-padding">
                    <div class="panel panel-default">
                        <div class="panel-heading"><h2>著作清單</h2></div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="well">
                                        <h4>新增著作項目</h4>
                                        <div class="row">
                                            <div class="col-md-6"><input type="text" class="form-control" placeholder="著作名稱"></div>
                                            <div class="col-md-3">
                                                <select class="form-control"><option>正式發表</option><option>預印本 (Preprint)</option></select>
                                            </div>
                                            <div class="col-md-2"><input type="text" class="form-control" placeholder="年份"></div>
                                            <div class="col-md-1"><button class="btn btn-success">新增</button></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <table class="table table-striped table-bordered">
                                <thead>
                                    <tr><th>名稱</th><th>類型</th><th>年份</th><th>操作</th></tr>
                                </thead>
                                <tbody id="workTable">
                                    <tr>
                                        <td>Sample Publication</td>
                                        <td><span class="label label-info">正式發表</span></td>
                                        <td>2024</td>
                                        <td><button class="btn btn-xs btn-danger">刪除</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>
<script src="js/nav-loader.js"></script>
</body>
</html>
