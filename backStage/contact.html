<!DOCTYPE html>
<html lang="zh-TW">
<head><style>.fa-heart { color: white !important; }</style>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>後台 - 聯繫資訊管理</title>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <link href="css/admin-custom.css" rel="stylesheet">
</head>
<body>
    <div class="templatemo-flex-row">
        <div class="templatemo-sidebar">
            <header class="templatemo-site-header"><div class="square"></div><h1>中央大學孫立憲</h1></header>
            <div class="profile-photo-container">
                <img src="images/LSBOY.png" alt="Profile Photo" class="img-responsive">
                <div class="profile-photo-overlay"></div>
            </div>
            <div class="sidebar-profile">
                <div class="sidebar-note">管理地址、電話與信箱等聯絡資料，之後會直接對應前台 Contact 區塊。</div>
            </div>
            <div id="nav-placeholder"></div>
        </div>
        <div class="templatemo-content col-1 light-gray-bg">
            <div class="page-shell">
            <div class="page-header-card">
                <h2>聯繫資訊管理</h2>
                <p>這些欄位將來會用來同步前台底部的地址、電話與 Email 顯示。</p>
            </div>
            <div class="templatemo-content-container content-card">
                <div class="templatemo-content-widget no-padding">
                    <div class="panel panel-default table-responsive">
                        <div class="panel-heading"><h2>基本聯絡資訊</h2></div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="well">
                                        <h4>修改基本聯繫資訊</h4>
                                        <div class="form-group">
                                            <label>電子郵件</label>
                                            <input type="email" class="form-control" placeholder="email@example.com">
                                        </div>
                                        <div class="form-group">
                                            <label>電話號碼</label>
                                            <input type="text" class="form-control" placeholder="09xx-xxx-xxx">
                                        </div>
                                        <div class="form-group">
                                            <label>辦公室地址</label>
                                            <input type="text" class="form-control" placeholder="中央大學統計研究所...">
                                        </div>
                                        <button class="btn btn-primary">儲存更新</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>
    <script src="js/nav-loader.js"></script>
</body>
</html>
