		<body>
			<div class="login-shell">
				<div class="login-layout">
					<section class="login-aside">
						<h1>SLH Backstage</h1>
						<p>這裡是孫立憲教授網站的後台管理入口，提供首頁 Banner、經歷與學歷、著作成果、演講紀錄與興趣活動的集中維護。</p>
						<p>目前先保留為靜態版型整理階段，下一步會接上 Spring Boot REST API。</p>
						<p>建議使用桌面版瀏覽器登入，以獲得較完整的管理體驗。</p>
					</section>
					<section class="login-panel">
			<div class="templatemo-content-widget templatemo-login-widget white-bg">
				<header class="text-center">
		          <div class="square"></div>
		          <h1>孫立憲教授後台登入</h1>
		        </header>
		        <form action="index.html" class="templatemo-login-form">
	        	<div class="form-group">
	        		<div class="input-group">
		        		<div class="input-group-addon"><i class="fa fa-user fa-fw"></i></div>	        		
		              	<input type="text" class="form-control" placeholder="12345678">           
		          	</div>	
	        	</div>
	        	<div class="form-group">
	        		<div class="input-group">
		        		<div class="input-group-addon"><i class="fa fa-key fa-fw"></i></div>	        		
		              	<input type="password" class="form-control" placeholder="******">           
		          	</div>	
	        	</div>
				
				<div class="form-group">
	        		<div class="input-group">
		        		<div class="input-group-addon"><i class="fa fa-globe fa-fw"></i></div>	        		
						
					    <select name="lang" id="lang" class="form-control">
							<option value="tw">中文</option>
							<option value="en">英文</option>
						</select>   	
		          	</div>	
	        	</div>
					          	
	          	<div class="form-group">
				    <div class="checkbox squaredTwo">
				        <input type="checkbox" id="c1" name="c1" value="c1" />
						<label for="c1"><span></span>Remember me</label>
				    </div>				    
				</div>
				 
				<div class="form-group">
					<button type="submit" class="templatemo-blue-button width-100">Login</button>
				</div>
		        </form>
				<div class="login-help">登入後將進入靜態後台示意頁，之後會改為實際 API 驗證流程。</div>
			</div>
					</section>
				</div>
			</div>
