<!DOCTYPE html>
<html lang="zh-TW">
<head><style>.fa-heart { color: white !important; }</style>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>後台 - 興趣活動管理</title>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <link href="css/admin-custom.css" rel="stylesheet">
    <style>
        .grid-upload-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .grid-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .square-upload-box { width: 100%; aspect-ratio: 1/1; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fff; }
        .square-upload-box img { width: 100%; height: 100%; object-fit: cover; }
        .link-input { width: 100%; padding: 5px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="templatemo-flex-row">
        <div class="templatemo-sidebar">
            <header class="templatemo-site-header"><div class="square"></div><h1>中央大學孫立憲</h1></header>
            <div class="profile-photo-container">
                <img src="images/LSBOY.png" alt="Profile Photo" class="img-responsive">
                <div class="profile-photo-overlay"></div>
            </div>
            <div class="sidebar-profile">
                <div class="sidebar-note">這一頁用來管理前台 Portfolio / 興趣活動。之後可對應圖片、分類、外部連結與排序。</div>
            </div>
            <div id="nav-placeholder"></div>
        </div>
        <div class="templatemo-content col-1 light-gray-bg">
            <div class="page-shell">
            <div class="page-header-card">
                <h2>興趣活動管理</h2>
                <p>先保留九宮格操作感，之後會改成可從 API 讀寫的作品集管理介面。</p>
            </div>
            <div class="templatemo-content-container content-card">
                <div class="templatemo-content-widget no-padding">
                    <div class="panel panel-default">
                        <div class="panel-heading"><h2>九宮格媒體管理</h2></div>
                        <div class="panel-body">
                            <p>點擊方格上傳照片，並在下方填入外掛影片連結 (YouTube/Bilibili)</p>
                            <div class="grid-upload-container" id="gridContainer">
                                <!-- 9 boxes generated by JS -->
                            </div>
                            <hr>
                            <button class="btn btn-primary">儲存所有設定</button>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>
    <script>
        const container = document.getElementById('gridContainer');
        for (let i = 1; i <= 9; i++) {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerHTML = `
                <div class="square-upload-box" onclick="document.getElementById('file${i}').click()">
                    <span id="text${i}">照片 ${i}</span>
                    <img id="prev${i}" style="display:none">
                </div>
                <input type="file" id="file${i}" style="display:none" accept="image/*" onchange="preview(${i}, this)">
                <input type="text" class="link-input" id="link${i}" placeholder="影片連結 (可選)">
            `;
            container.appendChild(item);
        }
        function preview(id, input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('prev' + id);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('text' + id).style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
    <script src="js/nav-loader.js"></script>
</body>
</html>
