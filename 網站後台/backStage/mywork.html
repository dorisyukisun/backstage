<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>後台 - 著作成果管理</title>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
</head>
<body>
    <div class="templatemo-flex-row">
        <div class="templatemo-sidebar">
            <header class="templatemo-site-header"><div class="square"></div><h1>中央大學孫立憲</h1></header>
            <nav class="templatemo-left-nav">
                <ul>
                    <li><a href="./index.html"><i class="fa fa-home fa-fw"></i>控制面板</a></li>
                    <li><a href="./about.html"><i class="fa fa-user fa-fw"></i>經歷與學歷</a></li>
                    <li><a href="./mywork.html" class="active"><i class="fa fa-database fa-fw"></i>著作與成果</a></li>
                    <li><a href="./talks.html"><i class="fa fa-microphone fa-fw"></i>演講紀錄</a></li>
                    <li><a href="./contact.html"><i class="fa fa-map-marker fa-fw"></i>聯繫資訊</a></li>
                    <li><a href="./manage-users.html"><i class="fa fa-users fa-fw"></i>使用者管理</a></li>
                    <li><a href="./preferences.html"><i class="fa fa-sliders fa-fw"></i>後台設定</a></li>
                    <li><a href="./login.html"><i class="fa fa-eject fa-fw"></i>登出</a></li>
                </ul>
            </nav>
        </div>
        <div class="templatemo-content col-1 light-gray-bg">
            <div class="templatemo-content-container">
                <div class="templatemo-content-widget no-padding">
                    <div class="panel panel-default">
                        <div class="panel-heading"><h2>著作成果管理</h2></div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="well">
                                        <h4>新增著作項目</h4>
                                        <div class="row">
                                            <div class="col-md-6"><input type="text" class="form-control" placeholder="著作名稱"></div>
                                            <div class="col-md-3">
                                                <select class="form-control"><option>正式發表</option><option>預印本 (Preprint)</option></select>
                                            </div>
                                            <div class="col-md-2"><input type="text" class="form-control" placeholder="年份"></div>
                                            <div class="col-md-1"><button class="btn btn-success">新增</button></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <table class="table table-striped table-bordered">
                                <thead>
                                    <tr><th>名稱</th><th>類型</th><th>年份</th><th>操作</th></tr>
                                </thead>
                                <tbody id="workTable">
                                    <tr>
                                        <td>Sample Publication</td>
                                        <td><span class="label label-info">正式發表</span></td>
                                        <td>2024</td>
                                        <td><button class="btn btn-xs btn-danger">刪除</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
