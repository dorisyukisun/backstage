<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>後台 - 經歷與學歷管理</title>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <style>
        .square-upload-box { width: 150px; height: 150px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .square-upload-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="templatemo-flex-row">
        <div class="templatemo-sidebar">
            <header class="templatemo-site-header"><div class="square"></div><h1>中央大學孫立憲</h1></header>
            
        <div id="nav-placeholder"></div>

        </div>
        <div class="templatemo-content col-1 light-gray-bg">
            <div class="templatemo-content-container">
                <div class="templatemo-content-widget no-padding">
                    <div class="panel panel-default">
                        <div class="panel-heading"><h2>經歷與學歷管理</h2></div>
                        <div class="panel-body">
                            <h4>1. 個人頭像上傳 (正方形)</h4>
                            <div class="square-upload-box" onclick="document.getElementById('avatarInput').click()">
                                <span id="avatarText">點擊上傳</span>
                                <img id="avatarPreview" style="display:none;">
                            </div>
                            <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="previewImage(this, 'avatarPreview', 'avatarText')">
                            <hr>
                            <h4>2. 經歷與學歷列表</h4>
                            <table class="table table-striped table-bordered">
                                <thead>
                                    <tr><th>類型</th><th>內容</th><th>年份</th><th>操作</th></tr>
                                </thead>
                                <tbody id="experienceTable">
                                    <tr>
                                        <td><select class="form-control"><option>經歷</option><option>學歷</option></select></td>
                                        <td><input type="text" class="form-control" placeholder="內容"></td>
                                        <td><input type="text" class="form-control" placeholder="年份"></td>
                                        <td><button class="btn btn-success">新增</button></td>
                                    </tr>
                                </tbody>
                            </table>
                            <hr>
                            <h4>3. CV 文件上傳 (PDF/Doc)</h4>
                            <input type="file" class="form-control" accept=".pdf,.doc,.docx">
                            <button class="btn btn-primary">儲存 CV</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function previewImage(input, imgId, textId) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(imgId).src = e.target.result;
                    document.getElementById(imgId).style.display = 'block';
                    document.getElementById(textId).style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
<script src="js/nav-loader.js"></script>
</body>
</html>
