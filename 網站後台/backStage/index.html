<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">  
    <title>中央大學孫立憲副教授後台首頁</title>
    <meta name="description" content="">
    <meta name="author" content="templatemo">
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <style>
        .carousel-preview-container { display: flex; overflow-x: auto; gap: 15px; padding: 15px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 20px; }
        .carousel-item { flex: 0 0 auto; text-align: center; width: 120px; }
        .carousel-item img { width: 100px; height: 60px; object-fit: contain; border: 1px solid #ccc; background: #fff; display: block; margin: 0 auto 5px; }
        .carousel-item .remove-btn { color: red; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>  
    <div class="templatemo-flex-row">
      <div class="templatemo-sidebar">
        <header class="templatemo-site-header">
          <div class="square"></div>
          <h1>中央大學孫立憲</h1>
        </header>
        <div class="profile-photo-container">
          <img src="images/LSBOY.png" alt="Profile Photo" class="img-responsive">  
          <div class="profile-photo-overlay"></div>
        </div>      
        <form class="templatemo-search-form" role="search">
          <div class="input-group">
              <button type="submit" class="fa fa-search"></button>
              <input type="text" class="form-control" placeholder="Search" name="srch-term" id="srch-term">           
          </div>
        </form>
        <div class="mobile-menu-icon">
            <i class="fa fa-bars"></i>
        </div>
        <div id="nav-placeholder"></div>
      </div>
      <div class="templatemo-content col-1 light-gray-bg">
        <div class="templatemo-top-nav-container">
          <div class="row">
            <nav class="templatemo-top-nav col-lg-12 col-md-12">
              <ul class="text-uppercase">
                <li><a href="./index.html" class="active">控制面板</a></li>
                <li><a href="./about.html">經歷</a></li>
                <li><a href="./mywork.html">著作</a></li>
                <li><a href="./contact.html">聯繫</a></li>
                <li><a href="./login.html">登出</a></li>
              </ul>  
            </nav> 
          </div>
        </div>
        <div class="templatemo-flex-row flex-content-row templatemo-overflow-hidden">
          <div class="col-1 templatemo-overflow-hidden">
            
            <!-- 1. 前台 Banner 圖片上傳 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default table-responsive">
                  <div class="panel-heading"><h2>前台首頁 Banner 設定</h2></div>
                  <div class="panel-body">
                    <div class="row">
                      <div class="col-md-4 text-center">
                        <div class="square-upload-box" onclick="document.getElementById('bannerInput').click()" style="width: 100px; height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto; background: #fff;">
                            <span id="bannerText">上傳 Banner</span>
                            <img id="bannerPreview" style="display:none; width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <input type="file" id="bannerInput" style="display:none" accept="image/*" onchange="previewBanner(this)">
                      </div>
                      <div class="col-md-8">
                        <p>請上傳一張高品質의 Banner 圖片，建議尺寸 1920x600。</p>
                        <button class="btn btn-primary" onclick="uploadBanner()">儲存 Banner</button>
                        <button class="btn btn-danger" onclick="removeBanner()">刪除</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 2. 合作單位 Logo 輪播管理 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>合作單位 Logo 輪播管理</h2></div>
                  <div class="panel-body">
                    <div class="well">
                        <h4>新增 Logo 到輪播圖</h4>
                        <div class="row">
                            <div class="col-md-3">
                                <input type="file" id="logoInput" accept="image/*" class="form-control" onchange="previewLogo(this)">
                                <div id="logoPreviewContainer" style="text-align:center; margin-top:10px;">
                                    <img id="logoPreview" style="display:none; width: 50px; height: 50px; object-fit: contain;">
                                </div>
                            </div>
                            <div class="col-md-7">
                                <input type="text" id="logoLink" class="form-control" placeholder="貼上網站連結 (https://...)">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-success" style="width: 100%;" onclick="addLogo()">新增</button>
                            </div>
                        </div>
                    </div>
                    <div class="//carousel-preview">
                        <h5>目前輪播內容預覽:</strong>
                        <div class="carousel-preview-container" id="logoGrid">
                            <!-- Logo items will be added here by JS -->
                        </div>
                    </div>
                    <hr>
                    <button class="btn btn-primary" style="display: block; margin: 0 auto;">儲存所有 Logo 設定</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- 3. 文字內容編輯器 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>首頁簡介文字編輯</h2></div>
                  <div class="panel-body">
                      <div id="editor">在此編輯首頁의 歡迎文字與簡介...</div>
                      <br>
                      <button class="btn btn-primary" style="display: block; margin: 0 auto;">儲存內容</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
      <footer class="text-right">
        <p>Copyright &copy;SLH | Designed by <a href=""target="_parent">dorisyukisun</a></p>
      </footer>         
    </div>
  </div>
</body>
</html>
