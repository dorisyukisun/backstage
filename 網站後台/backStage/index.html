<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">  
    <title>中央大學孫立憲副教授後台首頁</title>
    <meta name="description" content="">
    <meta name="author" content="templatemo">
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <style>
        .logo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .logo-item { border: 1px solid #ddd; padding: 10px; text-align: center; background: #fff; border-radius: 8px; position: relative; }
        .logo-item img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 5px; }
        .logo-item .remove-btn { position: absolute; top: 2px; right: 2px; color: red; cursor: pointer; font-weight: bold; }
        .logo-link-input { width: 100%; font-size: 11px; border: 1px solid #ccc; border-radius: 4px; }
        .square-upload-box { width: 100px; height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fff; margin: 0 auto; }
        .square-upload-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 15px; }
        .logo-item { border: 1px solid #ddd; padding: 10px; text-align: center; background: #fff; border-radius: 8px; position: relative; }
        .logo-item img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 5px; }
        .logo-item .remove-btn { position: absolute; top: 2px; right: 2px; color: red; cursor: pointer; font-weight: bold; }
        .logo-link-input { width: 100%; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>  
    <div class="templatemo-flex-row">
      <div class="templatemo-sidebar">
        <header class="templatemo-site-header">
          <div class="square"></div>
          <h1>中央大學孫立憲</h1>
        </header>
        <div class="profile-photo-container">
          <img src="images/LSBOY.png" alt="Profile Photo" class="img-responsive">  
          <div class="profile-photo-overlay"></div>
        </div>      
        <form class="templatemo-search-form" role="search">
          <div class="input-group">
              <button type="submit" class="fa fa-search"></button>
              <input type="text" class="form-control" placeholder="Search" name="srch-term" id="srch-term">           
          </div>
        </form>
        <div class="mobile-menu-icon">
            <i class="fa fa-bars"></i>
        </div>
        <div id="nav-placeholder"></div>
      </div>
      <div class="templatemo-content col-1 light-gray-bg">
        
        <div class="templatemo-flex-row flex-content-row templatemo-overflow-hidden">
          <div class="col-1 templatemo-overflow-hidden">
            
            <!-- 1. 前台 Banner 圖片上傳 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>前台首頁 Banner 設定</h2></div>
                  <div class="panel-body">
                    <div class="row">
                      <div class="col-md-4 text-center">
                        <div class="square-upload-box" onclick="document.getElementById('bannerInput').click()">
                            <span id="bannerText">上傳 Banner</span>
                            <img id="bannerPreview" style="display:none">
                        </div>
                        <input type="file" id="bannerInput" style="display:none" accept="image/*" onchange="previewBanner(this)">
                      </div>
                      <div class="col-md-8">
                        <p>請上傳一張高品質的 Banner 圖片，建議尺寸 1920x600。圖片將會顯示在首頁最上方。</p>
                        <button class="btn btn-primary" onclick="uploadBanner()">儲存 Banner</button>
                        <button class="btn btn-danger" onclick="removeBanner()">刪除</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 2. 合作單位 Logo 輪播管理 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>合作單位 Logo 輪播管理</h2></div>
                  <div class="panel-body">
                    <div class="well">
                        <h4>新增合作單位 Logo</h4>
                        <div class="row">
                            <div class="col-md-3">
                                <input type="file" id="logoInput" accept="image/*" class="form-control">
                            </div>
                            <div class="col-md-7">
                                <input type="text" id="logoLink" class="form-control" placeholder="輸入對應的網站連結 (https://...)">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-success" onclick="addLogo()">新增</button>
                            </div>
                        </div>
                    </div>
                    <div class="logo-grid" id="logoGrid">
                        <!-- Logo items will be added here by JS -->
                    </div>
                    <hr>
                    <button class="btn btn-primary">儲存所有 Logo 設定</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- 3. 文字內容編輯器 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>首頁簡介文字編輯</h2></div>
                  <div class="panel-body">
                      <div id="editor">在此編輯首頁的歡迎文字與簡介...</div>
                      <br>
                      <button class="btn btn-primary">儲存內容</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
      <footer class="text-right">
        <p>Copyright &copy;SLH | Designed by <a href=""target="_parent">dorisyukisun</a></p>
      </footer>         
    </div>
  </div>
</body>
</html>
