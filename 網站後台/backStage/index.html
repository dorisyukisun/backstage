<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">  
    <title>中央大學孫立憲副教授後台首頁</title>
    <meta name="description" content="">
    <meta name="author" content="templatemo">
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <style>
        .square-upload-box { width: 100px; height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fff; margin: 0 auto; }
        .square-upload-box img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-mgmt-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .carousel-mgmt-table th, .carousel-mgmt-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .carousel-mgmt-table th { background-color: #f2f2f2; }
        .carousel-img-prev { width: 50px; height: 30px; object-fit: contain; border: 1px solid #eee; }
    </style>
</head>
<body>  
    <div class="templatemo-flex-row">
      <div class="templatemo-sidebar">
        <header class="templatemo-site-header">
          <div class="square"></div>
          <h1>中央大學孫立憲</h1>
        </header>
        <div class="profile-photo-container">
          <img src="images/LSBOY.png" alt="Profile Photo" class="img-responsive">  
          <div class="profile-//photo-overlay"></div>
        </div>      
        <form class="templatemo-search-form" role="search">
          <div class="input-group">
              <button type="submit" class="fa fa-search"></button>
              <input type="text" class="form-control" placeholder="Search" name="srch-term" id="srch-term">           
          </div>
        </form>
        <div class="mobile-menu-icon">
            <i class="fa fa-bars"></i>
        </div>
        <div id="nav-placeholder"></div>
      </div>
      <div class="templatemo-content col-1 light-gray-bg">
        <div class="templatemo-top-nav-container">
          <div class="row">
            <nav class="templatemo-top-nav col-lg-12 col-md-12">
              <ul class="text-uppercase">
                <li><a href="./index.html" class="active">控制面板</a></li>
                <li><a href="./about.html">經歷</a></li>
                <li><a href="./mywork.html">著作</a></li>
                <li><a href="./contact.html">聯繫</a></li>
                <li><a href="./login.html">登出</a></li>
              </ul>  
            </nav> 
          </div>
        </div>
        <div class="templatemo-flex-row flex-content-row templatemo-overflow-hidden">
          <div class="col-1 templatemo-overflow-hidden">
            
            <!-- 1. 前台 Banner 圖片上傳 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>前台首頁 Banner 設定</h2></div>
                  <div class="panel-body">
                    <div class="row">
                      <div class="col-md-4 text-center">
                        <div class="square-upload-box" onclick="document.getElementById('bannerInput').click()">
                            <span id="bannerText">上傳 Banner</span>
                            <img id="bannerPreview" style="display:none">
                        </div>
                        <input type="file" id="bannerInput" style="display:none" accept="image/*" onchange="previewBanner(this)">
                      </div>
                      <div class="col-md-8">
                        <p>請上傳一張高品質의 Banner 圖片，建議尺寸 1920x600。</p>
                        <button class="btn btn-primary" onclick="uploadBanner()">儲存 Banner</button>
                        <button class="btn btn-danger" onclick="removeBanner()">刪除</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 2. 合作單位 Logo 輪播管理 - 按照截圖修改為表格模式 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>輪播圖管理</h2></div>
                  <div class="panel-body">
                    <div class="row" style="margin-bottom: 20px; align-items: center;">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label>位置：</label>
                                <select class="form-control">
                                    <option>運營位1</option>
                                    <option>運營位2</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label>狀態：</label>
                                <select class="form-control">
                                    <option>展示中</option>
                                    <option>未開始</option>
                                    <option>已結束</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-3 text-right">
                            <button class="btn btn-info">搜索</button>
                            <button class="btn btn-success" onclick="showAddModal()">新增</button>
                        </div>
                    </div>
                    
                    <table class="carousel-mgmt-table table table-striped table-bordered">
                        <thead>
                            <tr>
                                <th>序號</th>
                                <th>狀態</th>
                                <th>排序值</th>
                                <th>所屬位置</th>
                                <th>展示開始時間</th>
                                <th>展示結束時間</th>
                                <th>圖片</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="logoTableBody">
                            <tr>
                                <td>1</td>
                                <td><span class="label label-success">展示中</span></td>
                                <td>1</td>
                                <td>運營位1</td>
                                <td>2019-12-03 09:00</td>
                                <td>2019-12-03 18:00</td>
                                <td><img src="images/logo1.png" class="carousel-img-prev" onerror="this.src='https://via.placeholder.com/50'"></td>
                                <td><a href="#" class="text-primary">編輯</a> <a href="#" class="text-danger">刪除</a></td>
                            </tr>
                        </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>

            <!-- 3. 文字內容編輯器 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>首頁簡介文字編輯</h2></div>
                  <div class="panel-body">
                      <div id="editor">在此編輯首頁의 歡迎文字與簡介...</div>
                      <br>
                      <button class="btn btn-primary" style="display: block; margin: 0 auto;">儲存內容</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
      <footer class="text-right">
        <p>Copyright &copy;SLH | Designed by <a href=""target="_parent">dorisyukisun</a></p>
      </footer>         
    </div>
  </div>
</body>
</html>
