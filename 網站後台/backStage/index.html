<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">  
    <title>中央大學孫立憲副教授後台首頁</title>
    <meta name="description" content="">
    <meta name="author" content="templatemo">
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <style>
        .logo-upload-section { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
        .logo-upload-form { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .square-upload-box { width: 120px; height: 120px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #f9f9f9; transition: 0.3s; }
        .square-upload-box:hover { border-color: #337ab7; background: #f0f7ff; }
        .square-upload-box img { width: 100%; height: 100%; object-fit: contain; }
        .logo-link-input { width: 100%; max-width: 400px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .logo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 20px; }
        .logo-item { border: 1px solid #ddd; padding: 10px; text-align: center; background: #fff; border-radius: 8px; position: relative; transition: 0.2s; }
        .logo-item:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .logo-item img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 8px; }
        .logo-item .remove-btn { position: absolute; top: 5px; right: 5px; color: #ff4d4d; cursor: pointer; font-size: 12px; font-weight: bold; }
        .logo-item-link { font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
    </style>
</head>
<body>  
    <div class="templatemo-flex-row">
      <div class="templatemo-sidebar">
        <header class="templatemo-site-header">
          <div class="square"></div>
          <h1>中央大學孫立憲</h1>
        </header>
        <div class="profile-photo-container">
          <img src="images/LSBOY.png" alt="Profile Photo" class="img-responsive">  
          <div class="profile-photo-overlay"></div>
        </div>      
        <form class="templatemo-search-form" role="search">
          <div class="input-group">
              <button type="submit" class="fa fa-search"></button>
              <input type="text" class="form-control" placeholder="Search" name="srch-term" id="srch-term">           
          </div>
        </form>
        <div class="mobile-menu-icon">
            <i class="fa fa-bars"></i>
        </div>
        <div id="nav-placeholder"></div>
      </div>
      <div class="templatemo-content col-1 light-gray-bg">
        <div class="templatemo-top-nav-container">
          <div class="row">
            <nav class="templatemo-top-nav col-lg-12 col-md-12">
              <ul class="text-uppercase">
                <li><a href="./index.html" class="active">控制面板</a></li>
                <li><a href="./about.html">經歷</a></li>
                <li><a href="./mywork.html">著作</a></li>
                <li><a href="./contact.html">聯繫</a></li>
                <li><a href="./login.html">登出</a></li>
              </ul>  
            </nav> 
          </div>
        </div>
        <div class="templatemo-flex-row flex-content-row templatemo-overflow-hidden">
          <div class="col-1 templatemo-overflow-hidden">
            
            <!-- 1. 前台 Banner 圖片上傳 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>前台首頁 Banner 設定</h2></div>
                  <div class="panel-body">
                    <div class="row">
                      <div class="col-md-4 text-center">
                        <div class="square-upload-box" onclick="document.getElementById('bannerInput').click()">
                            <span id="bannerText">上傳 Banner</span>
                            <img id="bannerPreview" style="display:none">
                        </div>
                        <input type="file" id="bannerInput" style="display:none" accept="image/*" onchange="previewBanner(this)">
                      </div>
                      <div class="col-md-8">
                        <p>請上傳一張高品質의 Banner 圖片，建議尺寸 1920x600。</p>
                        <button class="btn btn-primary" onclick="uploadBanner()">儲存 Banner</button>
                        <button class="btn btn-danger" onclick="removeBanner()">刪除</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 2. 合作單位 Logo 輪播管理 - 根據兔兔的手繪稿優化 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>合作單位 Logo 輪播管理</h2></div>
                  <div class="panel-body">
                    <div class="logo-upload-section" style="text-align: center; margin-bottom: 30px; background: #fcfcfc; padding: 20px; border-radius: 10px; border: 1px solid #eee;">
                        <h4>新增 Logo</h4>
                        <div class="logo-upload-form" style="display: flex; flex-direction: column; align-items: center; gap: 15px; max-width: 300px; margin: 0 auto;">
                            <div class="square-upload-box" onclick="document.getElementById('logoInput').click()">
                                <span id="logoText">點擊上傳 Logo</span>
                                <img id="logoPreview" style="display:none">
                            </div>
                            <input type="file" id="logoInput" style="display:none" accept="image/*" onchange="previewLogo(this)">
                            <input type="text" id="logoLink" class="logo-link-input" placeholder="貼上網站連結 (https://...)">
                            <button class="btn btn-success" style="width: 100px;" onclick="addLogo()">新增</button>
                        </div>
                    </div>
                    <div class="logo-grid" id="logoGrid">
                        <!-- Logo items will be added here by JS -->
                    </div>
                    <hr>
                    <button class="btn btn-primary" style="display: block; margin: 0 auto;">儲存所有 Logo 設定</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- 3. 文字內容編輯器 -->
            <div class="templatemo-content-container">
              <div class="templatemo-content-widget no-padding">
                <div class="panel panel-default">
                  <div class="panel-heading"><h2>首頁簡介文字編輯</h2></div>
                  <div class="panel-body">
                      <div id="editor">在此編輯首頁의 歡迎文字與簡介...</div>
                      <br>
                      <button class="btn btn-primary" style="display: block; margin: 0 auto;">儲存內容</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
      <footer class="text-right">
        <p>Copyright &copy;SLH | Designed by <a href=""target="_parent">dorisyukisun</a></p>
      </footer>         
    </div>
  </div>
</body>
</html>
