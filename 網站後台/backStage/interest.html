<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>後台 - 興趣活動管理</title>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,700' rel='stylesheet' type='text/css'>
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/templatemo-style.css" rel="stylesheet">
    <style>
        .grid-upload-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .square-upload-box { width: 100%; aspect-ratio: 1/1; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fff; }
        .square-upload-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="templatemo-flex-row">
        <div class="templatemo-sidebar">
            <header class="templatemo-site-header"><div class="square"></div><h1>中央大學孫立憲</h1></header>
            
        <nav class="templatemo-left-nav">          
          <ul>
            <li><a href="./index.html"><i class="fa fa-home fa-fw"></i>控制面板</a></li>
<li><a href="./about.html"><i class="fa fa-user fa-fw"></i>經歷與學歷</a></li>
<li><a href="./mywork.html"><i class="fa fa-database fa-fw"></i>著作與成果</a></li>
<li><a href="./talks.html"><i class="fa fa-microphone fa-fw"></i>演講紀錄</a></li>
<li><a href="./interest.html" class="active"><i class="fa fa-heart fa-fw"></i>興趣活動</a></li>
<li><a href="./contact.html"><i class="fa fa-map-marker fa-fw"></i>聯繫資訊</a></li>
<li><a href="./manage-users.html"><i class="fa fa-users fa-fw"></i>使用者管理</a></li>
<li><a href="./preferences.html"><i class="fa fa-sliders fa-fw"></i>後台設定</a></li>
<li><a href="./login.html"><i class="fa fa-eject fa-fw"></i>登出</a></li>

          </ul>  
        </nav>

        </div>
        <div class="templatemo-content col-1 light-gray-bg">
            <div class="templatemo-content-container">
                <div class="templatemo-content-widget no-padding">
                    <div class="panel panel-default">
                        <div class="panel-heading"><h2>興趣活動管理 (九宮格)</h2></div>
                        <div class="panel-body">
                            <p>點擊方格上傳照片，可設定外掛影片連結 (YouTube/Bilibili)</p>
                            <div class="grid-upload-container" id="gridContainer">
                                <!-- 9 boxes generated by JS -->
                            </div>
                            <hr>
                            <button class="btn btn-primary">儲存所有設定</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const container = document.getElementById('gridContainer');
        for (let i = 1; i <= 9; i++) {
            const box = document.createElement('div');
            box.className = 'square-upload-box';
            box.innerHTML = `<span>照片 ${i}</span><img id="prev${i}" style="display:none"><input type="file" id="file${i}" style="display:none" accept="image/*" onchange="preview(${i}, this)">`;
            box.onclick = () => document.getElementById('file' + i).click();
            container.appendChild(box);
        }
        function preview(id, input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('prev' + id);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    //- remove text
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
